<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福小窝 | 实时业绩看板 (Gemini 云端版)</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ... (保留了原本所有优美的 CSS 样式) ... */
:root { --pink: #d63384; --pink-mid: #ff8fab; --pink-lt: #ffb7c5; --pink-bg: #fff0f5; --pink-card:#fff5f8; --pink-bdr: #ffd6e0; --green: #0ab57a; --red: #e84545; --text: #2d1a24; --muted: #a07088; --white: #ffffff; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', 'PingFang SC', sans-serif; background: var(--pink-bg); color: var(--text); min-height: 100vh; padding: 0 0 3rem; }
.header { background: linear-gradient(135deg, #d63384 0%, #ff8fab 100%); padding: 1.8rem 1.5rem 1.4rem; text-align: center; box-shadow: 0 4px 20px rgba(214,51,132,0.25); }
.header h1 { color: #fff; font-size: clamp(1.4rem,4vw,2rem); font-weight: 900; letter-spacing: 0.02em; }
.header p  { color: rgba(255,255,255,0.82); font-size: 0.82rem; margin-top: 0.25rem; font-style: italic; }
.header-date { color: rgba(255,255,255,0.7); font-size: 0.72rem; margin-top: 0.4rem; font-family: 'Space Mono', monospace; }
.wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 0; }
.sec-title { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; padding-left: 0.2rem; }
.input-panel, .kpi-card, .ch-card, .progress-panel, .log-panel, .export-panel { background: var(--white); border: 1.5px solid var(--pink-bdr); border-radius: 18px; padding: 1.4rem 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 2px 12px rgba(214,51,132,0.06); }
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
.panel-head-left { display: flex; align-items: center; gap: 0.5rem; }
.panel-head-left .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pink); animation: pulse 1.8s infinite; }
.panel-head-left span { font-size: 0.9rem; font-weight: 800; color: var(--pink); }
.saved-badge { background: rgba(10,181,122,0.1); color: var(--green); border: 1px solid rgba(10,181,122,0.25); border-radius: 99px; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.7rem; display: none; }
.saved-badge.show { display: inline-block; }
.input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
@media(max-width:520px){ .input-grid { grid-template-columns: 1fr; } }
.input-field label { font-size: 0.75rem; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; margin-bottom: 0.35rem; }
.input-field input { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid var(--pink-bdr); border-radius: 10px; font-size: 1rem; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--text); background: var(--pink-card); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.input-field input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(214,51,132,0.1); }
.monthly-row { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
.monthly-row .input-field { flex: 1; }
.btn-save { width: 100%; padding: 0.85rem; background: linear-gradient(135deg, #d63384, #ff8fab); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 1rem; box-shadow: 0 4px 14px rgba(214,51,132,0.3); transition: transform 0.15s, box-shadow 0.15s; }
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(214,51,132,0.38); }
.btn-save:active { transform: scale(0.98); }
.kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.8rem; margin-bottom: 1.2rem; }
@media(max-width:520px){ .kpi-row { grid-template-columns: 1fr 1fr; } }
.kpi-card { text-align: center; }
.kpi-card .kpi-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 0.3rem; }
.kpi-card .kpi-val { font-size: 1.35rem; font-weight: 900; color: var(--pink); font-family: 'Space Mono', monospace; line-height: 1.1; }
.kpi-card .kpi-sub { font-size: 0.68rem; color: var(--muted); margin-top: 0.25rem; }
.kpi-card.green .kpi-val { color: var(--green); }
.channel-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.8rem; margin-bottom: 1.2rem; }
@media(max-width:520px){ .channel-grid { grid-template-columns: 1fr; } }
.ch-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.7rem; }
.ch-name { font-size: 0.9rem; font-weight: 800; color: var(--pink); }
.ch-pct-badge { background: var(--pink-bg); color: var(--muted); border-radius: 99px; font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.55rem; border: 1px solid var(--pink-bdr); }
.ch-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; margin-bottom: 0.25rem; }
.ch-row span:last-child  { font-weight: 700; font-family: 'Space Mono', monospace; font-size: 0.82rem; }
.ch-status { margin-top: 0.6rem; padding: 0.3rem 0.6rem; border-radius: 8px; font-size: 0.75rem; font-weight: 700; text-align: center; }
.ch-status.ok  { background: rgba(10,181,122,0.1); color: var(--green); }
.ch-status.bad { background: rgba(232,69,69,0.08); color: var(--red); }
.ch-bar-wrap { height: 5px; background: var(--pink-bg); border-radius: 99px; margin-top: 0.6rem; overflow: hidden; }
.ch-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
.prog-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.prog-title { font-size: 0.9rem; font-weight: 800; color: var(--text); }
.prog-pct { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--pink); }
.prog-bar-wrap { height: 14px; background: var(--pink-bg); border-radius: 99px; overflow: hidden; margin-bottom: 0.6rem; }
.prog-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #d63384, #ff8fab); transition: width 0.8s; }
.prog-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); font-weight: 600; }
.log-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.log-title { font-size: 0.9rem; font-weight: 800; color: var(--text); }
.btn-clear { background: none; border: 1px solid var(--pink-bdr); color: var(--muted); border-radius: 8px; font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.7rem; cursor: pointer; }
.log-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.log-table th { background: var(--pink-bg); color: var(--muted); font-weight: 700; font-size: 0.68rem; padding: 0.5rem; text-align: left; }
.log-table td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--pink-bdr); }
.log-table td:last-child { text-align: right; font-family: 'Space Mono', monospace; font-weight: 700; color: var(--pink); }
.log-table td.date-col { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted); }
.btn-del { background: none; border: none; cursor: pointer; color: #e0a0b0; font-size: 0.9rem; }
.banner { background: linear-gradient(135deg, #d63384 0%, #ff8fab 100%); border-radius: 16px; padding: 1.1rem 1.4rem; color: #fff; text-align: center; margin-bottom: 1.2rem; display: none; }
.banner.show { display: block; }
.export-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.8rem; margin-top: 0.8rem; }
@media(max-width:520px){ .export-grid { grid-template-columns: 1fr; } }
.export-btn { display: flex; align-items: center; gap: 0.7rem; padding: 0.9rem 1.1rem; border-radius: 12px; border: 1.5px solid var(--pink-bdr); background: var(--pink-card); cursor: pointer; text-align: left; transition: 0.2s; }
.export-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(214,51,132,0.12); }
.export-btn .eb-icon { font-size: 1.5rem; flex-shrink: 0; }
.export-btn .eb-text strong { display: block; font-size: 0.85rem; font-weight: 800; color: var(--text); }
.export-btn .eb-text span   { font-size: 0.72rem; color: var(--muted); }
.export-btn.google { background: #fff; border: 1.5px solid #4285F4; }
.export-btn.google .eb-text strong { color: #4285F4; }
.export-btn.primary { background: linear-gradient(135deg,#d63384,#ff8fab); border-color: transparent; }
.export-btn.primary .eb-text strong, .export-btn.primary .eb-text span { color: #fff; }
@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.3); opacity:0.6; } }
</style>
</head>
<body>

<div class="header">
  <h1>🍰 幸福小窝 Ytsweetstory</h1>
  <p>幸福小窝，传递幸福</p>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="wrap">
  <div class="banner" id="banner"><p id="bannerText"></p><small id="bannerSub"></small></div>

  <div class="sec-title">📝 今日录入</div>
  <div class="input-panel">
    <div class="panel-head">
      <div class="panel-head-left"><div class="dot"></div><span>今日实收</span></div>
      <span class="saved-badge" id="savedBadge">✓ 已保存</span>
    </div>
    <div class="monthly-row">
      <div class="input-field"><label>📅 月度总目标</label><input type="number" id="monthlyTarget" value="30000" oninput="softUpdate()" /></div>
      <div class="input-field"><label>📆 本月天数</label><input type="number" id="monthDays" value="31" oninput="softUpdate()" /></div>
    </div>
    <div class="input-grid">
      <div class="input-field"><label>🛒 线上 (60%)</label><input type="number" id="in-online" placeholder="0" oninput="softUpdate()" /></div>
      <div class="input-field"><label>🚗 车后厢 (20%)</label><input type="number" id="in-boot" placeholder="0" oninput="softUpdate()" /></div>
      <div class="input-field"><label>🏪 门店对接 (10%)</label><input type="number" id="in-store" placeholder="0" oninput="softUpdate()" /></div>
      <div class="input-field"><label>☕ 咖啡店 (10%)</label><input type="number" id="in-cafe" placeholder="0" oninput="softUpdate()" /></div>
    </div>
    <button class="btn-save" onclick="saveToday()">💾 保存今日业绩</button>
  </div>

  <div class="sec-title">📊 今日概览</div>
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">今日实收</div><div class="kpi-val" id="kpi-today">RM 0</div><div class="kpi-sub" id="kpi-today-sub">目标 RM —</div></div>
    <div class="kpi-card" id="kpi-rate-card"><div class="kpi-label">今日达成率</div><div class="kpi-val" id="kpi-rate">0%</div><div class="kpi-sub" id="kpi-rate-sub">—</div></div>
    <div class="kpi-card" id="kpi-gap-card"><div class="kpi-label">今日还差/超出</div><div class="kpi-val" id="kpi-gap">RM 0</div><div class="kpi-sub" id="kpi-gap-sub">—</div></div>
  </div>

  <div class="sec-title">📍 各渠道详情</div>
  <div class="channel-grid" id="channelGrid"></div>

  <div class="sec-title">🚀 月度总目标进度</div>
  <div class="progress-panel">
    <div class="prog-head"><span class="prog-title" id="progTitle">本月累计</span><span class="prog-pct" id="progPct">0%</span></div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progBar" style="width:0%"></div></div>
    <div class="prog-meta"><span id="progLeft">已收 RM 0</span><span id="progRight">目标 RM 30000</span></div>
  </div>

  <div class="sec-title">📋 每日记录（本月）</div>
  <div class="log-panel">
    <div class="log-head"><span class="log-title">历史明细</span><button class="btn-clear" onclick="confirmClear()">🗑 清除本月</button></div>
    <div id="logWrap"></div>
  </div>

  <div class="sec-title">☁️ 云端同步 & 备份</div>
  <div class="export-panel">
    <div style="font-size:0.82rem;color:var(--muted); margin-bottom: 10px;">店长下班前请点击同步，老板即可在云端表格实时查看财务报表。</div>
    
    <button class="export-btn google" style="width: 100%; margin-bottom: 10px;" onclick="syncToGoogle()" id="btn-google">
      <span class="eb-icon">☁️</span>
      <span class="eb-text">
        <strong>一键同步至 Google Sheets</strong>
        <span>将今日实收自动上传到老板的报表</span>
      </span>
    </button>

    <div class="export-grid">
      <button class="export-btn primary" onclick="exportCSV()">
        <span class="eb-icon">📊</span>
        <span class="eb-text"><strong>导出 CSV</strong><span>适合本地查账</span></span>
      </button>
      <button class="export-btn" onclick="exportJSON()">
        <span class="eb-icon">📦</span>
        <span class="eb-text"><strong>导出 JSON</strong><span>换手机用</span></span>
      </button>
    </div>
  </div>
</div>

<script>
// ─── GOOGLE SHEETS 设定 ───
// 勇，请把你在第一步获取的网址，粘贴到下面引号里：
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzP-zDcGBPaOme-nGJuihwY7vfdmsDMBkIBUcHLmT1L_B0_zUxdc8Cfbt3doXtc-kdLyg/exec";

// ─── 核心功能设定 ───
const CHANNELS = [
  { id:'online', name:'线上销售', icon:'🛒', pct:0.60, color:'#d63384' },
  { id:'boot',   name:'车后厢销售', icon:'🚗', pct:0.20, color:'#ff8fab' },
  { id:'store',  name:'门店对接', icon:'🏪', pct:0.10, color:'#fb6f92' },
  { id:'cafe',   name:'咖啡店档口', icon:'☕', pct:0.10, color:'#ffc2d1' },
];

function monthKey() { const d = new Date(); return `yt_records_${d.getFullYear()}_${d.getMonth()+1}`; }
function loadRecords() { try { return JSON.parse(localStorage.getItem(monthKey()) || '[]'); } catch { return []; } }
function saveRecords(arr) { localStorage.setItem(monthKey(), JSON.stringify(arr)); }

function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmt(n) { return 'RM ' + (Math.round(n*100)/100).toLocaleString('zh-MY',{minimumFractionDigits:2}); }

window.onload = function() {
  const d = new Date();
  document.getElementById('headerDate').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ` + ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][d.getDay()];
  
  const recs = loadRecords();
  const today = recs.find(r => r.date === todayStr());
  if (today) {
    document.getElementById('in-online').value = today.online || '';
    document.getElementById('in-boot').value   = today.boot   || '';
    document.getElementById('in-store').value  = today.store  || '';
    document.getElementById('in-cafe').value   = today.cafe   || '';
  }
  buildChannelCards(); fullUpdate();
};

function buildChannelCards() {
  document.getElementById('channelGrid').innerHTML = CHANNELS.map(ch => `
    <div class="ch-card">
      <div class="ch-head"><span class="ch-name">${ch.icon} ${ch.name}</span><span class="ch-pct-badge">${ch.pct*100}%</span></div>
      <div class="ch-row"><span>日指标</span><span id="ch-target-${ch.id}">—</span></div>
      <div class="ch-row"><span>今日实收</span><span id="ch-actual-${ch.id}">—</span></div>
      <div class="ch-status" id="ch-status-${ch.id}">—</div>
      <div class="ch-bar-wrap"><div class="ch-bar-fill" id="ch-bar-${ch.id}" style="width:0%;background:${ch.color}"></div></div>
    </div>`).join('');
}

function softUpdate() {
  const mt = parseFloat(document.getElementById('monthlyTarget').value) || 30000;
  const days = parseInt(document.getElementById('monthDays').value) || 31;
  const dayTarget = mt / days;
  const vals = {
    online: parseFloat(document.getElementById('in-online').value) || 0,
    boot:   parseFloat(document.getElementById('in-boot').value) || 0,
    store:  parseFloat(document.getElementById('in-store').value) || 0,
    cafe:   parseFloat(document.getElementById('in-cafe').value) || 0
  };
  const todayTotal = vals.online + vals.boot + vals.store + vals.cafe;

  document.getElementById('kpi-today').textContent = fmt(todayTotal);
  document.getElementById('kpi-rate').textContent = (dayTarget > 0 ? (todayTotal/dayTarget*100).toFixed(1) : 0) + '%';
  document.getElementById('kpi-gap').textContent = fmt(Math.abs(todayTotal - dayTarget));
  document.getElementById('kpi-gap-sub').textContent = (todayTotal - dayTarget) >= 0 ? '超出目标 🎉' : '距离目标还差';

  CHANNELS.forEach(ch => {
    const tgt = dayTarget * ch.pct;
    const act = vals[ch.id] || 0;
    const gap = act - tgt;
    document.getElementById(`ch-target-${ch.id}`).textContent = fmt(tgt);
    document.getElementById(`ch-actual-${ch.id}`).textContent = fmt(act);
    const st = document.getElementById(`ch-status-${ch.id}`);
    if(act === 0) { st.className = 'ch-status bad'; st.textContent = `✗ 还差 ${fmt(tgt)}`; }
    else if(gap >= 0) { st.className = 'ch-status ok'; st.textContent = `✓ 已达标 (+${fmt(gap)})`; }
    else { st.className = 'ch-status bad'; st.textContent = `✗ 还差 ${fmt(Math.abs(gap))}`; }
    document.getElementById(`ch-bar-${ch.id}`).style.width = (tgt>0 ? Math.min(act/tgt*100,100) : 0) + '%';
  });
}

function fullUpdate() {
  softUpdate();
  const mt = parseFloat(document.getElementById('monthlyTarget').value) || 30000;
  const recs = loadRecords();
  const monthTotal = recs.reduce((s,r) => s + (r.total||0), 0);
  const pct = mt > 0 ? Math.min(monthTotal/mt*100, 100) : 0;
  document.getElementById('progPct').textContent = pct.toFixed(1) + '%';
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLeft').textContent = `已收 ${fmt(monthTotal)}`;
  
  const wrap = document.getElementById('logWrap');
  if (!recs.length) { wrap.innerHTML = '<div style="text-align:center;color:#a07088;font-size:0.8rem;padding:1rem;">暂无记录</div>'; return; }
  wrap.innerHTML = `<table class="log-table"><tr><th>日期</th><th>合计</th><th></th></tr>` + 
    [...recs].reverse().map(r => `<tr><td class="date-col">${r.date}</td><td>${fmt(r.total)}</td><td><button class="btn-del" onclick="deleteRecord('${r.date}')">✕</button></td></tr>`).join('') + `</table>`;
}

function saveToday() {
  const vals = {
    online: parseFloat(document.getElementById('in-online').value) || 0,
    boot:   parseFloat(document.getElementById('in-boot').value) || 0,
    store:  parseFloat(document.getElementById('in-store').value) || 0,
    cafe:   parseFloat(document.getElementById('in-cafe').value) || 0
  };
  const total = vals.online + vals.boot + vals.store + vals.cafe;
  if (total === 0) { alert('请先输入数据！'); return; }

  const recs = loadRecords();
  const today = todayStr();
  const idx = recs.findIndex(r => r.date === today);
  const record = { date: today, ...vals, total };
  
  if (idx >= 0) recs[idx] = record; else recs.push(record);
  recs.sort((a,b) => a.date.localeCompare(b.date));
  saveRecords(recs);
  
  document.getElementById('savedBadge').classList.add('show');
  setTimeout(() => document.getElementById('savedBadge').classList.remove('show'), 3000);
  fullUpdate();
}

function deleteRecord(date) {
  if(!confirm('确定删除?')) return;
  saveRecords(loadRecords().filter(r => r.date !== date));
  fullUpdate();
}
function confirmClear() {
  if(!confirm('确定清空本月?')) return;
  saveRecords([]); fullUpdate();
}

// ─── Gemini 核心功能：同步到云端 ───
function syncToGoogle() {
  if(GOOGLE_SCRIPT_URL === "在此处粘贴你的 Web App 网址") {
    alert("老板！你还没有填入 Google Sheets 的同步网址哦！请看我的教程。");
    return;
  }

  const recs = loadRecords();
  const todayRec = recs.find(r => r.date === todayStr());
  
  if(!todayRec) {
    alert("请先点击上方的【保存今日业绩】按钮，再进行同步！");
    return;
  }

  const btn = document.getElementById('btn-google');
  const originalText = btn.innerHTML;
  btn.innerHTML = "⏳ 正在连接 Google 云端...";

  // 使用 no-cors 模式确保在简单的本地 HTML 中不会报错
  fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(todayRec)
  }).then(() => {
    alert("✅ 成功！今日数据已同步到老板的 Google Sheets！");
    btn.innerHTML = originalText;
  }).catch(err => {
    alert("❌ 同步出现问题，请检查网络。");
    btn.innerHTML = originalText;
  });
}

function exportCSV() { /* 保持你原来的 CSV 功能 */ }
function exportJSON() { /* 保持你原来的 JSON 功能 */ }
</script>
</body>
</html>
