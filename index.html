<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福小窝 | 实时业绩看板</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink:     #d63384;
  --pink-mid: #ff8fab;
  --pink-lt:  #ffb7c5;
  --pink-bg:  #fff0f5;
  --pink-card:#fff5f8;
  --pink-bdr: #ffd6e0;
  --green:    #0ab57a;
  --red:      #e84545;
  --text:     #2d1a24;
  --muted:    #a07088;
  --white:    #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--pink-bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 3rem;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #d63384 0%, #ff8fab 100%);
  padding: 1.8rem 1.5rem 1.4rem;
  text-align: center;
  box-shadow: 0 4px 20px rgba(214,51,132,0.25);
}
.header h1 { color: #fff; font-size: clamp(1.4rem,4vw,2rem); font-weight: 900; letter-spacing: 0.02em; }
.header p  { color: rgba(255,255,255,0.82); font-size: 0.82rem; margin-top: 0.25rem; font-style: italic; }
.header-date { color: rgba(255,255,255,0.7); font-size: 0.72rem; margin-top: 0.4rem; font-family: 'Space Mono', monospace; }

/* ── LAYOUT ── */
.wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 0; }

/* ── SECTION TITLE ── */
.sec-title {
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.8rem;
  padding-left: 0.2rem;
}

/* ── TODAY INPUT PANEL ── */
.input-panel {
  background: var(--white);
  border: 1.5px solid var(--pink-bdr);
  border-radius: 18px;
  padding: 1.4rem 1.5rem;
  margin-bottom: 1.2rem;
  box-shadow: 0 2px 12px rgba(214,51,132,0.06);
  animation: fadeUp 0.4s ease both;
}
.input-panel .panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.1rem;
}
.panel-head-left { display: flex; align-items: center; gap: 0.5rem; }
.panel-head-left .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--pink); animation: pulse 1.8s infinite;
}
.panel-head-left span { font-size: 0.9rem; font-weight: 800; color: var(--pink); }
.saved-badge {
  background: rgba(10,181,122,0.1); color: var(--green);
  border: 1px solid rgba(10,181,122,0.25); border-radius: 99px;
  font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.7rem;
  display: none;
}
.saved-badge.show { display: inline-block; }

.input-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.8rem;
}
@media(max-width:520px){ .input-grid { grid-template-columns: 1fr; } }

.input-field label {
  font-size: 0.75rem; font-weight: 700; color: var(--muted);
  display: flex; align-items: center; gap: 0.35rem;
  margin-bottom: 0.35rem;
}
.input-field input {
  width: 100%; padding: 0.65rem 0.9rem;
  border: 1.5px solid var(--pink-bdr);
  border-radius: 10px; font-size: 1rem; font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: var(--text); background: var(--pink-card);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.input-field input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(214,51,132,0.1);
}

.monthly-row {
  display: flex; gap: 0.8rem;
  margin-bottom: 1rem;
}
.monthly-row .input-field { flex: 1; }

.btn-save {
  width: 100%; padding: 0.85rem;
  background: linear-gradient(135deg, #d63384, #ff8fab);
  color: #fff; border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  margin-top: 1rem;
  box-shadow: 0 4px 14px rgba(214,51,132,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(214,51,132,0.38); }
.btn-save:active { transform: scale(0.98); }

/* ── KPI ROW ── */
.kpi-row {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 0.8rem; margin-bottom: 1.2rem;
  animation: fadeUp 0.4s 0.1s ease both;
}
@media(max-width:520px){ .kpi-row { grid-template-columns: 1fr 1fr; } }

.kpi-card {
  background: var(--white); border: 1.5px solid var(--pink-bdr);
  border-radius: 16px; padding: 1rem 1.1rem;
  text-align: center;
  box-shadow: 0 2px 10px rgba(214,51,132,0.05);
}
.kpi-card .kpi-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 0.3rem; }
.kpi-card .kpi-val { font-size: 1.35rem; font-weight: 900; color: var(--pink); font-family: 'Space Mono', monospace; line-height: 1.1; }
.kpi-card .kpi-sub { font-size: 0.68rem; color: var(--muted); margin-top: 0.25rem; }
.kpi-card.green .kpi-val { color: var(--green); }
.kpi-card.warn  .kpi-val { color: #f59e0b; }

/* ── CHANNEL CARDS ── */
.channel-grid {
  display: grid; grid-template-columns: repeat(2,1fr);
  gap: 0.8rem; margin-bottom: 1.2rem;
  animation: fadeUp 0.4s 0.15s ease both;
}
@media(max-width:520px){ .channel-grid { grid-template-columns: 1fr; } }

.ch-card {
  background: var(--white); border: 1.5px solid var(--pink-bdr);
  border-radius: 16px; padding: 1.1rem 1.2rem;
  box-shadow: 0 2px 10px rgba(214,51,132,0.05);
}
.ch-card .ch-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.7rem;
}
.ch-name { font-size: 0.9rem; font-weight: 800; color: var(--pink); }
.ch-pct-badge {
  background: var(--pink-bg); color: var(--muted);
  border-radius: 99px; font-size: 0.68rem; font-weight: 700;
  padding: 0.15rem 0.55rem; border: 1px solid var(--pink-bdr);
}
.ch-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; margin-bottom: 0.25rem; }
.ch-row span:first-child { color: var(--muted); }
.ch-row span:last-child  { font-weight: 700; font-family: 'Space Mono', monospace; font-size: 0.82rem; }
.ch-status {
  margin-top: 0.6rem; padding: 0.3rem 0.6rem;
  border-radius: 8px; font-size: 0.75rem; font-weight: 700;
  text-align: center;
}
.ch-status.ok  { background: rgba(10,181,122,0.1); color: var(--green); }
.ch-status.bad { background: rgba(232,69,69,0.08); color: var(--red); }

.ch-bar-wrap { height: 5px; background: var(--pink-bg); border-radius: 99px; margin-top: 0.6rem; overflow: hidden; }
.ch-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

/* ── MONTHLY PROGRESS ── */
.progress-panel {
  background: var(--white); border: 1.5px solid var(--pink-bdr);
  border-radius: 18px; padding: 1.4rem 1.5rem;
  margin-bottom: 1.2rem;
  box-shadow: 0 2px 12px rgba(214,51,132,0.06);
  animation: fadeUp 0.4s 0.2s ease both;
}
.prog-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.prog-title { font-size: 0.9rem; font-weight: 800; color: var(--text); }
.prog-pct { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--pink); }
.prog-bar-wrap { height: 14px; background: var(--pink-bg); border-radius: 99px; overflow: hidden; margin-bottom: 0.6rem; }
.prog-bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #d63384, #ff8fab);
  transition: width 0.8s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.prog-bar-fill::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0;
  width: 20px; background: rgba(255,255,255,0.35); border-radius: 99px;
  animation: shimmer 1.5s infinite;
}
.prog-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); font-weight: 600; }

/* ── DAILY LOG TABLE ── */
.log-panel {
  background: var(--white); border: 1.5px solid var(--pink-bdr);
  border-radius: 18px; padding: 1.4rem 1.5rem;
  margin-bottom: 1.2rem;
  box-shadow: 0 2px 12px rgba(214,51,132,0.06);
  animation: fadeUp 0.4s 0.25s ease both;
}
.log-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.log-title { font-size: 0.9rem; font-weight: 800; color: var(--text); }
.btn-clear {
  background: none; border: 1px solid var(--pink-bdr); color: var(--muted);
  border-radius: 8px; font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.7rem;
  cursor: pointer; transition: background 0.15s;
}
.btn-clear:hover { background: var(--pink-bg); }

.log-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.log-table th {
  background: var(--pink-bg); color: var(--muted);
  font-weight: 700; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 0.5rem 0.7rem; text-align: left;
}
.log-table th:first-child { border-radius: 8px 0 0 8px; }
.log-table th:last-child  { border-radius: 0 8px 8px 0; text-align: right; }
.log-table td { padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--pink-bdr); }
.log-table tr:last-child td { border-bottom: none; }
.log-table td:last-child { text-align: right; font-family: 'Space Mono', monospace; font-weight: 700; color: var(--pink); }
.log-table td.date-col { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted); }
.today-row td { background: rgba(214,51,132,0.03); }
.empty-log { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 1.5rem 0; }

/* ── DELETE ROW BTN ── */
.btn-del {
  background: none; border: none; cursor: pointer; color: #e0a0b0;
  font-size: 0.9rem; padding: 0 0.3rem;
  transition: color 0.15s;
}
.btn-del:hover { color: var(--red); }

/* ── MOTIVATIONAL BANNER ── */
.banner {
  background: linear-gradient(135deg, #d63384 0%, #ff8fab 100%);
  border-radius: 16px; padding: 1.1rem 1.4rem;
  color: #fff; text-align: center; margin-bottom: 1.2rem;
  box-shadow: 0 4px 16px rgba(214,51,132,0.25);
  animation: fadeUp 0.4s 0.3s ease both;
  display: none;
}
.banner.show { display: block; }
.banner p { font-size: 1rem; font-weight: 800; }
.banner small { font-size: 0.78rem; opacity: 0.85; }

/* ── EXPORT PANEL ── */
.export-panel {
  background: var(--white); border: 1.5px solid var(--pink-bdr);
  border-radius: 18px; padding: 1.4rem 1.5rem;
  margin-bottom: 1.2rem;
  box-shadow: 0 2px 12px rgba(214,51,132,0.06);
  animation: fadeUp 0.4s 0.28s ease both;
}
.export-grid {
  display: grid; grid-template-columns: repeat(2,1fr);
  gap: 0.8rem; margin-top: 0.8rem;
}
@media(max-width:520px){ .export-grid { grid-template-columns: 1fr; } }

.export-btn {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.9rem 1.1rem;
  border-radius: 12px; border: 1.5px solid var(--pink-bdr);
  background: var(--pink-card); cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  text-align: left;
}
.export-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(214,51,132,0.12); border-color: var(--pink-mid); }
.export-btn:active { transform: scale(0.98); }
.export-btn .eb-icon { font-size: 1.5rem; flex-shrink: 0; }
.export-btn .eb-text strong { display: block; font-size: 0.85rem; font-weight: 800; color: var(--text); }
.export-btn .eb-text span   { font-size: 0.72rem; color: var(--muted); }
.export-btn.primary { background: linear-gradient(135deg,#d63384,#ff8fab); border-color: transparent; }
.export-btn.primary .eb-text strong,
.export-btn.primary .eb-text span { color: #fff; }

/* import area */
.import-area {
  margin-top: 0.9rem; padding: 0.9rem 1rem;
  border: 1.5px dashed var(--pink-bdr); border-radius: 12px;
  background: var(--pink-bg); display: flex; align-items: center; gap: 0.8rem;
  flex-wrap: wrap;
}
.import-area label { font-size: 0.8rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.import-area input[type=file] { font-size: 0.75rem; color: var(--muted); flex: 1; min-width: 0; }
.import-msg { font-size: 0.75rem; color: var(--green); font-weight: 700; display: none; }
.import-msg.show { display: block; }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.3); opacity:0.6; } }
@keyframes shimmer { 0%{ opacity:0.35; } 50%{ opacity:0.7; } 100%{ opacity:0.35; } }
</style>
</head>
<body>

<div class="header">
  <h1>🍰 幸福小窝 Ytsweetstory</h1>
  <p>幸福小窝，传递幸福</p>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="wrap">

  <!-- MOTIVATIONAL BANNER -->
  <div class="banner" id="banner">
    <p id="bannerText">🎉 今天超标了！继续保持！</p>
    <small id="bannerSub"></small>
  </div>

  <!-- TODAY INPUT -->
  <div class="sec-title">📝 今日录入</div>
  <div class="input-panel">
    <div class="panel-head">
      <div class="panel-head-left">
        <div class="dot"></div>
        <span id="todayLabel">今日实收</span>
      </div>
      <span class="saved-badge" id="savedBadge">✓ 已保存</span>
    </div>

    <div class="monthly-row">
      <div class="input-field">
        <label>📅 月度总目标 (RM)</label>
        <input type="number" id="monthlyTarget" value="30000" placeholder="30000" oninput="softUpdate()" />
      </div>
      <div class="input-field">
        <label>📆 本月天数</label>
        <input type="number" id="monthDays" value="31" min="28" max="31" oninput="softUpdate()" />
      </div>
    </div>

    <div class="input-grid">
      <div class="input-field">
        <label>🛒 线上 (60%)</label>
        <input type="number" id="in-online" placeholder="0.00" oninput="softUpdate()" />
      </div>
      <div class="input-field">
        <label>🚗 车后厢 (20%)</label>
        <input type="number" id="in-boot" placeholder="0.00" oninput="softUpdate()" />
      </div>
      <div class="input-field">
        <label>🏪 门店对接 (10%)</label>
        <input type="number" id="in-store" placeholder="0.00" oninput="softUpdate()" />
      </div>
      <div class="input-field">
        <label>☕ 咖啡店档口 (10%)</label>
        <input type="number" id="in-cafe" placeholder="0.00" oninput="softUpdate()" />
      </div>
    </div>
    <button class="btn-save" onclick="saveToday()">💾 保存今日业绩</button>
  </div>

  <!-- KPI ROW -->
  <div class="sec-title">📊 今日概览</div>
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">今日实收</div>
      <div class="kpi-val" id="kpi-today">RM 0</div>
      <div class="kpi-sub" id="kpi-today-sub">目标 RM —</div>
    </div>
    <div class="kpi-card" id="kpi-rate-card">
      <div class="kpi-label">今日达成率</div>
      <div class="kpi-val" id="kpi-rate">0%</div>
      <div class="kpi-sub" id="kpi-rate-sub">—</div>
    </div>
    <div class="kpi-card" id="kpi-gap-card">
      <div class="kpi-label">今日还差 / 超出</div>
      <div class="kpi-val" id="kpi-gap">RM 0</div>
      <div class="kpi-sub" id="kpi-gap-sub">—</div>
    </div>
  </div>

  <!-- CHANNEL CARDS -->
  <div class="sec-title">📍 各渠道详情</div>
  <div class="channel-grid" id="channelGrid"></div>

  <!-- MONTHLY PROGRESS -->
  <div class="sec-title">🚀 月度总目标进度</div>
  <div class="progress-panel">
    <div class="prog-head">
      <span class="prog-title" id="progTitle">本月累计</span>
      <span class="prog-pct" id="progPct">0%</span>
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar-fill" id="progBar" style="width:0%"></div>
    </div>
    <div class="prog-meta">
      <span id="progLeft">已收 RM 0</span>
      <span id="progRight">目标 RM 30,000</span>
    </div>
  </div>

  <!-- DAILY LOG -->
  <div class="sec-title">📋 每日记录（本月）</div>
  <div class="log-panel">
    <div class="log-head">
      <span class="log-title">历史明细</span>
      <button class="btn-clear" onclick="confirmClear()">🗑 清除本月数据</button>
    </div>
    <div id="logWrap"></div>
  </div>

  <!-- EXPORT / IMPORT -->
  <div class="sec-title">💾 导出 & 备份</div>
  <div class="export-panel">
    <div style="font-size:0.82rem;color:var(--muted);">定期备份可防止数据丢失，CSV 可直接导入 Google Sheets 与员工共享。</div>
    <div class="export-grid">
      <button class="export-btn primary" onclick="exportCSV()">
        <span class="eb-icon">📊</span>
        <span class="eb-text">
          <strong>导出 CSV</strong>
          <span>适合 Google Sheets / Excel</span>
        </span>
      </button>
      <button class="export-btn" onclick="exportJSON()">
        <span class="eb-icon">📦</span>
        <span class="eb-text">
          <strong>导出 JSON 备份</strong>
          <span>完整备份，可还原数据</span>
        </span>
      </button>
    </div>
    <div class="import-area">
      <label>🔁 还原备份：</label>
      <input type="file" id="importFile" accept=".json" onchange="importJSON(this)" />
      <span class="import-msg" id="importMsg">✓ 还原成功！</span>
    </div>
  </div>

</div><!-- /wrap -->

<script>
// ─── CONFIG ───────────────────────────────
const CHANNELS = [
  { id:'online', name:'线上销售',   icon:'🛒', pct:0.60, color:'#d63384' },
  { id:'boot',   name:'车后厢销售', icon:'🚗', pct:0.20, color:'#ff8fab' },
  { id:'store',  name:'门店对接',   icon:'🏪', pct:0.10, color:'#fb6f92' },
  { id:'cafe',   name:'咖啡店档口', icon:'☕', pct:0.10, color:'#ffc2d1' },
];

// ─── STORAGE KEY ──────────────────────────
function monthKey() {
  const d = new Date();
  return `yt_records_${d.getFullYear()}_${d.getMonth()+1}`;
}
function settingsKey() { return 'yt_settings'; }

// ─── STORAGE HELPERS (localStorage) ──────
function loadRecords() {
  try { return JSON.parse(localStorage.getItem(monthKey()) || '[]'); }
  catch { return []; }
}
function saveRecords(arr) {
  localStorage.setItem(monthKey(), JSON.stringify(arr));
}
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(settingsKey()) || '{}'); }
  catch { return {}; }
}
function saveSettings(obj) {
  localStorage.setItem(settingsKey(), JSON.stringify(obj));
}

// ─── DATE ─────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(s) {
  const [y,m,dd] = s.split('-');
  return `${m}月${dd}日`;
}

// ─── FORMAT ───────────────────────────────
function fmt(n) {
  return 'RM ' + (Math.round(n*100)/100).toLocaleString('zh-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ─── INIT ─────────────────────────────────
window.onload = function() {
  // Header date
  const d = new Date();
  document.getElementById('headerDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ` +
    ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][d.getDay()];

  // Load settings
  const s = loadSettings();
  if (s.monthlyTarget) document.getElementById('monthlyTarget').value = s.monthlyTarget;
  if (s.monthDays)     document.getElementById('monthDays').value     = s.monthDays;

  // Load today's existing record if any
  const recs = loadRecords();
  const today = recs.find(r => r.date === todayStr());
  if (today) {
    document.getElementById('in-online').value = today.online || '';
    document.getElementById('in-boot').value   = today.boot   || '';
    document.getElementById('in-store').value  = today.store  || '';
    document.getElementById('in-cafe').value   = today.cafe   || '';
    document.getElementById('savedBadge').classList.add('show');
  }

  buildChannelCards();
  fullUpdate();
};

// ─── BUILD CHANNEL CARDS ──────────────────
function buildChannelCards() {
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = CHANNELS.map(ch => `
    <div class="ch-card" id="chcard-${ch.id}">
      <div class="ch-head">
        <span class="ch-name">${ch.icon} ${ch.name}</span>
        <span class="ch-pct-badge">${Math.round(ch.pct*100)}%</span>
      </div>
      <div class="ch-row"><span>日指标</span><span id="ch-target-${ch.id}">—</span></div>
      <div class="ch-row"><span>今日实收</span><span id="ch-actual-${ch.id}">—</span></div>
      <div class="ch-status" id="ch-status-${ch.id}">—</div>
      <div class="ch-bar-wrap">
        <div class="ch-bar-fill" id="ch-bar-${ch.id}" style="width:0%;background:${ch.color}"></div>
      </div>
    </div>
  `).join('');
}

// ─── SOFT UPDATE (no save, just preview) ──
function softUpdate() {
  const mt   = parseFloat(document.getElementById('monthlyTarget').value) || 30000;
  const days = parseInt(document.getElementById('monthDays').value)       || 31;
  const dayTarget = mt / days;

  const vals = getInputVals();
  const todayTotal = vals.online + vals.boot + vals.store + vals.cafe;

  // KPI
  const rate = dayTarget > 0 ? (todayTotal / dayTarget * 100) : 0;
  const gap  = todayTotal - dayTarget;

  document.getElementById('kpi-today').textContent = fmt(todayTotal);
  document.getElementById('kpi-today-sub').textContent = `日指标 ${fmt(dayTarget)}`;
  document.getElementById('kpi-rate').textContent  = rate.toFixed(1) + '%';
  document.getElementById('kpi-rate-sub').textContent = rate >= 100 ? '🎉 已达标！' : '继续加油！';
  document.getElementById('kpi-gap').textContent   = fmt(Math.abs(gap));
  document.getElementById('kpi-gap-sub').textContent  = gap >= 0 ? '超出目标 🎉' : '距离目标还差';

  const rateCard = document.getElementById('kpi-rate-card');
  const gapCard  = document.getElementById('kpi-gap-card');
  rateCard.className = 'kpi-card' + (rate >= 100 ? ' green' : rate >= 80 ? ' warn' : '');
  gapCard.className  = 'kpi-card' + (gap >= 0 ? ' green' : '');

  // Channels
  CHANNELS.forEach(ch => {
    const chTarget = dayTarget * ch.pct;
    const chActual = vals[ch.id] || 0;
    const chGap    = chActual - chTarget;
    const pct      = chTarget > 0 ? Math.min(chActual / chTarget * 100, 100) : 0;

    document.getElementById(`ch-target-${ch.id}`).textContent = fmt(chTarget);
    document.getElementById(`ch-actual-${ch.id}`).textContent = fmt(chActual);

    const st = document.getElementById(`ch-status-${ch.id}`);
    if (chActual === 0) {
      st.className = 'ch-status bad';
      st.textContent = `✗ 还差 ${fmt(chTarget)}`;
    } else if (chGap >= 0) {
      st.className = 'ch-status ok';
      st.textContent = `✓ 已达标 (+${fmt(chGap)})`;
    } else {
      st.className = 'ch-status bad';
      st.textContent = `✗ 还差 ${fmt(Math.abs(chGap))}`;
    }
    document.getElementById(`ch-bar-${ch.id}`).style.width = pct + '%';
  });
}

// ─── FULL UPDATE (includes saved records) ─
function fullUpdate() {
  softUpdate();

  const mt   = parseFloat(document.getElementById('monthlyTarget').value) || 30000;
  const recs = loadRecords();

  // Monthly total from ALL saved records
  const monthTotal = recs.reduce((s,r) => s + (r.total||0), 0);
  const pct = mt > 0 ? Math.min(monthTotal / mt * 100, 100) : 0;

  document.getElementById('progPct').textContent   = pct.toFixed(1) + '%';
  document.getElementById('progBar').style.width   = pct + '%';
  document.getElementById('progLeft').textContent  = `已收 ${fmt(monthTotal)}`;
  document.getElementById('progRight').textContent = `目标 ${fmt(mt)}`;
  document.getElementById('progTitle').textContent =
    `本月累计 (共 ${recs.length} 天)`;

  renderLog(recs);
}

// ─── GET INPUT VALS ───────────────────────
function getInputVals() {
  return {
    online: parseFloat(document.getElementById('in-online').value) || 0,
    boot:   parseFloat(document.getElementById('in-boot').value)   || 0,
    store:  parseFloat(document.getElementById('in-store').value)  || 0,
    cafe:   parseFloat(document.getElementById('in-cafe').value)   || 0,
  };
}

// ─── SAVE TODAY ───────────────────────────
function saveToday() {
  const vals = getInputVals();
  const total = vals.online + vals.boot + vals.store + vals.cafe;
  if (total === 0) { alert('请先输入今日收入数据！'); return; }

  // Save settings
  saveSettings({
    monthlyTarget: document.getElementById('monthlyTarget').value,
    monthDays: document.getElementById('monthDays').value,
  });

  // Save/update today's record
  const recs   = loadRecords();
  const today  = todayStr();
  const idx    = recs.findIndex(r => r.date === today);
  const record = { date: today, ...vals, total };

  if (idx >= 0) recs[idx] = record;
  else recs.push(record);

  recs.sort((a,b) => a.date.localeCompare(b.date));
  saveRecords(recs);

  // Badge
  const badge = document.getElementById('savedBadge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 3000);

  // Banner
  const mt      = parseFloat(document.getElementById('monthlyTarget').value) || 30000;
  const days    = parseInt(document.getElementById('monthDays').value) || 31;
  const dayTgt  = mt / days;
  const monthTotal = recs.reduce((s,r) => s + (r.total||0), 0);

  const banner   = document.getElementById('banner');
  const bText    = document.getElementById('bannerText');
  const bSub     = document.getElementById('bannerSub');
  const monthPct = (monthTotal / mt * 100).toFixed(1);

  if (total >= dayTgt) {
    bText.textContent = `🎉 今天达标了！超出 ${fmt(total - dayTgt)}`;
    bSub.textContent  = `本月累计进度：${monthPct}% · 继续加油！`;
    banner.style.background = 'linear-gradient(135deg, #0ab57a, #00d9a3)';
  } else {
    bText.textContent = `💪 今日已保存！距离日目标还差 ${fmt(dayTgt - total)}`;
    bSub.textContent  = `本月累计进度：${monthPct}%`;
    banner.style.background = 'linear-gradient(135deg, #d63384, #ff8fab)';
  }
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 5000);

  fullUpdate();
}

// ─── RENDER LOG ───────────────────────────
function renderLog(recs) {
  const wrap = document.getElementById('logWrap');
  if (!recs.length) {
    wrap.innerHTML = '<div class="empty-log">暂无记录，快去录入今日业绩吧 🍰</div>';
    return;
  }

  // Show newest first
  const sorted = [...recs].reverse();
  const today  = todayStr();

  wrap.innerHTML = `
    <table class="log-table">
      <thead>
        <tr>
          <th>日期</th>
          <th>线上</th>
          <th>车后厢</th>
          <th>门店</th>
          <th>咖啡店</th>
          <th>合计</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(r => `
          <tr class="${r.date===today?'today-row':''}">
            <td class="date-col">${fmtDate(r.date)}${r.date===today?' 今':'  '}</td>
            <td>${fmt(r.online||0)}</td>
            <td>${fmt(r.boot||0)}</td>
            <td>${fmt(r.store||0)}</td>
            <td>${fmt(r.cafe||0)}</td>
            <td>${fmt(r.total||0)}</td>
            <td><button class="btn-del" onclick="deleteRecord('${r.date}')" title="删除">✕</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ─── DELETE ONE RECORD ────────────────────
function deleteRecord(date) {
  if (!confirm(`确定删除 ${fmtDate(date)} 的记录吗？`)) return;
  const recs = loadRecords().filter(r => r.date !== date);
  saveRecords(recs);
  // If deleting today, clear inputs
  if (date === todayStr()) {
    ['online','boot','store','cafe'].forEach(id => {
      document.getElementById('in-'+id).value = '';
    });
    document.getElementById('savedBadge').classList.remove('show');
  }
  fullUpdate();
}

// ─── CLEAR ALL ────────────────────────────
function confirmClear() {
  if (!confirm('确定清除本月所有记录吗？此操作无法撤销！')) return;
  saveRecords([]);
  ['online','boot','store','cafe'].forEach(id => {
    document.getElementById('in-'+id).value = '';
  });
  document.getElementById('savedBadge').classList.remove('show');
  fullUpdate();
}

// ─── EXPORT CSV ───────────────────────────
function exportCSV() {
  const recs = loadRecords();
  if (!recs.length) { alert('没有记录可导出！'); return; }

  const mt   = parseFloat(document.getElementById('monthlyTarget').value) || 30000;
  const days = parseInt(document.getElementById('monthDays').value) || 31;
  const dayTarget = mt / days;

  // BOM for Excel/Sheets Chinese compatibility
  const BOM = '\uFEFF';
  const header = ['日期','线上销售(RM)','车后厢销售(RM)','门店对接(RM)','咖啡店档口(RM)','当日合计(RM)','当日目标(RM)','达成率(%)','超出/还差(RM)'];

  const rows = recs.map(r => {
    const total  = r.total || 0;
    const tgt    = dayTarget;
    const rate   = tgt > 0 ? (total / tgt * 100).toFixed(1) : '0.0';
    const gap    = (total - tgt).toFixed(2);
    return [
      r.date,
      (r.online||0).toFixed(2),
      (r.boot||0).toFixed(2),
      (r.store||0).toFixed(2),
      (r.cafe||0).toFixed(2),
      total.toFixed(2),
      tgt.toFixed(2),
      rate,
      gap
    ].join(',');
  });

  // Summary row
  const monthTotal = recs.reduce((s,r) => s+(r.total||0), 0);
  rows.push(''); // blank line
  rows.push(`月度汇总,,,,,${monthTotal.toFixed(2)},${mt.toFixed(2)},${(monthTotal/mt*100).toFixed(1)}%,`);

  const csv = BOM + [header.join(','), ...rows].join('\r\n');
  const d   = new Date();
  const fname = `幸福小窝_${d.getFullYear()}年${d.getMonth()+1}月业绩.csv`;
  downloadFile(csv, fname, 'text/csv;charset=utf-8;');
}

// ─── EXPORT JSON BACKUP ───────────────────
function exportJSON() {
  const recs = loadRecords();
  const settings = loadSettings();
  const d = new Date();

  const backup = {
    app: '幸福小窝 Ytsweetstory',
    exportedAt: new Date().toISOString(),
    month: `${d.getFullYear()}-${d.getMonth()+1}`,
    settings,
    records: recs,
  };

  const json  = JSON.stringify(backup, null, 2);
  const fname = `幸福小窝备份_${d.getFullYear()}年${d.getMonth()+1}月_${d.getDate()}日.json`;
  downloadFile(json, fname, 'application/json');
}

// ─── IMPORT JSON BACKUP ───────────────────
function importJSON(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.records || !Array.isArray(backup.records)) {
        alert('文件格式不正确，请选择正确的备份文件！'); return;
      }
      if (!confirm(`备份日期：${backup.exportedAt ? backup.exportedAt.slice(0,10) : '未知'}\n共 ${backup.records.length} 条记录。\n\n确定还原？当前数据将被覆盖！`)) return;

      saveRecords(backup.records);
      if (backup.settings) saveSettings(backup.settings);

      // Reload settings into inputs
      if (backup.settings) {
        if (backup.settings.monthlyTarget) document.getElementById('monthlyTarget').value = backup.settings.monthlyTarget;
        if (backup.settings.monthDays)     document.getElementById('monthDays').value     = backup.settings.monthDays;
      }

      const msg = document.getElementById('importMsg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);

      fullUpdate();
    } catch(err) {
      alert('还原失败，文件可能已损坏！');
    }
    input.value = ''; // reset file input
  };
  reader.readAsText(file);
}

// ─── DOWNLOAD HELPER ──────────────────────
function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
